name: Build Android APK

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        
      - name: Install dependencies
        run: npm ci
        
      - name: Build Debug APK
        run: |
          npx cap sync android
          cd android
          ./gradlew assembleDebug
        
      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_tag=v$VERSION" >> $GITHUB_OUTPUT
        
      - name: Generate Update Manifest
        if: github.event_name == 'release'
        run: |
          cat > update-manifest.json << EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "tag": "${{ steps.version.outputs.version_tag }}",
            "releaseDate": "${{ github.event.release.created_at }}",
            "releaseNotes": "${{ github.event.release.body }}",
            "channels": {
              "stable": {
                "version": "${{ steps.version.outputs.version }}",
                "apkUrl": "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/app-debug.apk",
                "mandatory": false
              },
              "beta": {
                "version": "${{ steps.version.outputs.version }}",
                "apkUrl": "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version_tag }}/app-debug.apk",
                "mandatory": false
              }
            }
          }
          EOF
          cat update-manifest.json
        
      - name: Upload APK to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            android/app/build/outputs/apk/debug/*.apk
            update-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload APK Artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: miso-chat-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          
      - name: Upload Manifest Artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: update-manifest
          path: update-manifest.json

  capgo-sync:
    name: Sync with Capgo (Optional)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          
      - name: Install Capgo CLI
        run: npm install -g @capgo/cli
      
      - name: Sync with Capgo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CAPGO_API_KEY: ${{ secrets.CAPGO_API_KEY }}
          CAPGO_APP_ID: ${{ secrets.CAPGO_APP_ID || 'chat.openclaw.miso' }}
        run: |
          # Download the release assets
          gh release download ${{ github.event.release.tag_name }} --pattern "*.apk" --dir ./release-assets
          
          # Upload to Capgo for OTA distribution
          capgo upload \
            --app-id $CAPGO_APP_ID \
            --version ${{ github.event.release.tag_name }} \
            --binary-path ./release-assets/*.apk \
            --channel stable

