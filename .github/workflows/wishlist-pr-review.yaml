---
name: Wishlist PR Review (AI)

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: wishlist-pr-review
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  review-wishlist-pr:
    name: Wishlist PR Review
    if: >-
      ${{
        !github.event.pull_request.draft &&
        github.event.pull_request.user.login == 'itsmiso-ai'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_BASE_URL: "https://api.minimax.io/anthropic/v1"
      MINIMAX_MODEL: "MiniMax-M2.7"
      BOT_APP_ID: ${{ secrets.MISO_BOT_APP_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.MISO_BOT_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate MINIMAX_API_KEY
        run: |
          set -euo pipefail
          : "${MINIMAX_API_KEY:?Missing secret MINIMAX_API_KEY — add it in repo settings -> secrets}"

      - name: Validate bot secrets
        run: |
          set -euo pipefail
          : "${BOT_APP_ID:?Missing secret MISO_BOT_APP_ID — add it in repo settings -> secrets}"
          : "${BOT_APP_PRIVATE_KEY:?Missing secret MISO_BOT_PRIVATE_KEY — add it in repo settings -> secrets}"

      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ env.BOT_APP_ID }}
          private-key: ${{ env.BOT_APP_PRIVATE_KEY }}

      - name: Prefer bot token for GitHub API
        run: |
          set -euo pipefail
          echo "GH_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Validate runtime dependencies
        run: |
          set -euo pipefail
          command -v gh >/dev/null
          command -v jq >/dev/null

      - name: Collect PR context
        run: |
          set -euo pipefail

          gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json number,title,body,headRefOid,baseRefName,headRefName,author,changedFiles,additions,deletions,files,url,labels \
            > pr.json

          gh pr diff "$PR_NUMBER" --repo "$REPO" > pr.diff
          head -c 100000 pr.diff > pr.diff.truncated

          gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate > pr-files.raw.json
          jq '[.[] | {filename,status,additions,deletions,changes,patch}]' pr-files.raw.json > pr-files.json
          head -c 60000 pr-files.json > pr-files.truncated.json

          jq -r '.body // ""' pr.json | grep -oE '#[0-9]+' | head -5 > linked-issues.txt || true

          jq -r '[.[] | .filename | split(".") | last]' pr-files.raw.json \
            | sort | uniq -c | sort -rn > file-types.txt || true

      - name: Check skip criteria
        id: skip-check
        run: |
          set -euo pipefail

          FILETYPES=$(cat file-types.txt 2>/dev/null || true)
          if echo "$FILETYPES" | grep -qvE '^( *[0-9]+ (js|ts|mjs|cjs|jsx|tsx|json|md|yml|yaml|toml))$'; then
            echo "skip_review=false" >> "$GITHUB_OUTPUT"
            echo "reason=all-javascript" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(jq '[.[] | select(.filename | test("\\.(lock|package-lock\\.json|yarn\\.lock|pnpm-lock\\.yaml)$") | not)] | length' pr-files.raw.json)
          if [ "$CHANGED" -eq 0 ]; then
            echo "skip_review=true" >> "$GITHUB_OUTPUT"
            echo "reason=only-lockfile" >> "$GITHUB_OUTPUT"
          else
            echo "skip_review=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather linked issue context
        if: steps.skip-check.outputs.skip_review != 'true'
        run: |
          set -euo pipefail

          : > linked-issues.md

          while IFS= read -r issue_ref; do
            [ -z "$issue_ref" ] && continue
            echo "$issue_ref" | grep -qE '^#[0-9]+$' || continue
            num="${issue_ref#\#}"

            echo "## Linked Issue: #$num" >> linked-issues.md
            echo >> linked-issues.md

            if gh issue view "$num" --repo "$REPO" --json number,title,body,state,labels > issue.json 2>/dev/null; then
              echo "**Title:** $(jq -r '.title' issue.json)" >> linked-issues.md
              echo "**State:** $(jq -r '.state' issue.json)" >> linked-issues.md
              echo "**Labels:** $(jq -r '[.labels[].name] | join(", ")' issue.json)" >> linked-issues.md
              echo >> linked-issues.md
              echo "**Body:**" >> linked-issues.md
              jq -r '.body // "(no body)"' issue.json | head -c 3000 >> linked-issues.md
              echo >> linked-issues.md
            else
              echo "(Could not fetch issue #$num)" >> linked-issues.md
            fi
            echo >> linked-issues.md
          done < linked-issues.txt

          if [ ! -s linked-issues.md ]; then
            echo "(No issue references found in PR body)" > linked-issues.md
          fi

      - name: Gather repo standards (CLAUDE.md)
        if: steps.skip-check.outputs.skip_review != 'true'
        run: |
          set -euo pipefail

          : > clude-standards.md
          if [ -f CLAUDE.md ]; then
            echo "# Repository Standards" >> clude-standards.md
            cat CLAUDE.md >> clude-standards.md
          else
            echo "(CLAUDE.md not found)" >> clude-standards.md
          fi

      - name: Build review corpus
        if: steps.skip-check.outputs.skip_review != 'true'
        run: |
          set -euo pipefail

          {
            echo "# PR Metadata"
            jq '.' pr.json
            echo
            echo "# Changed Files"
            cat file-types.txt 2>/dev/null || echo "(none)"
            echo
            echo "# PR Diff (truncated)"
            echo '```diff'
            cat pr.diff.truncated
            echo '```'
            echo
            echo "# PR Files"
            echo '```json'
            cat pr-files.truncated.json
            echo '```'
            echo
            echo "# Linked Issues"
            cat linked-issues.md
            echo
            echo "# Repository Standards (CLAUDE.md)"
            cat clude-standards.md
          } > review-corpus.md

          head -c 180000 review-corpus.md > review-corpus.truncated.md

      - name: Analyze with minimax
        if: steps.skip-check.outputs.skip_review != 'true'
        id: analyze
        run: |
          set -euo pipefail

          SYSTEM_PROMPT="You review pull requests in a Node.js/Express chat application repository (miso-chat). The PRs are partial fixes generated by an automated wishlist cron — they may be incomplete or imperfect. Your goal is to assess whether the code change is likely to address the stated issue, not to perform a perfect code review.

Review focus:
1. Does the code change plausibly address the issue described in the linked issue/PR?
2. Are there obvious bugs, security issues, or regressions?
3. Does the test coverage make sense for what was changed?
4. Does the implementation follow reasonable patterns from the existing codebase?
5. Should this be approved as-is, or does it need changes before merging?

CLAUDE.md conventions (if present) should be respected.

Return STRICT JSON with exactly these keys:
- verdict: \"approve\" | \"request_changes\" | \"comment\"
- summary: one-sentence plain-text summary of the assessment
- review_markdown: full human-readable markdown with: overview, what was changed and why, concerns (if any), and recommendation
- concerns: array of {severity: \"high\"|\"medium\"|\"low\", text: string} for any specific concerns
- confidence: \"high\"|\"medium\"|\"low\" for how confident you are in this assessment

Be conservative. Prefer \"comment\" (post feedback without blocking) if uncertain. Only \"request_changes\" for clear problems. Do not invent facts — use only the provided corpus."

          jq -n \
            --arg model "$MINIMAX_MODEL" \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "Review this PR from the wishlist cron and return STRICT JSON." \
            --rawfile corpus review-corpus.truncated.md \
            '{"model":$model,"messages":[{"role":"system","content":$system},{"role":"user","content":($user + "\n\n" + $corpus)}],"temperature":0.1}' > ai-request.json

          RESPONSE=$(curl -fsSL "$MINIMAX_BASE_URL/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $MINIMAX_API_KEY" \
            --data @ai-request.json)

          if [ -z "$RESPONSE" ]; then
            echo "minimax_request_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$RESPONSE" > ai-response.json

          jq -r '.choices[0].message.content // empty' ai-response.json > ai-output.raw 2>/dev/null || true

          if [ ! -s ai-output.raw ]; then
            echo "minimax_request_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sed -e 's/^```json$//' -e 's/^```$//' ai-output.raw | sed '/^$/d' > ai-output.json

          if ! jq . ai-output.json > /dev/null 2>&1; then
            echo "minimax_parse_failed=true" >> "$GITHUB_OUTPUT"
            cat ai-output.raw >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERDICT=$(jq -r '.verdict // "comment"' ai-output.json)
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

      - name: Build review comment
        if: steps.skip-check.outputs.skip_review != 'true' && steps.analyze.outputs.verdict != ''
        run: |
          set -euo pipefail

          VERDICT="${{ steps.analyze.outputs.verdict }}"

          if [ "$VERDICT" = "approve" ]; then
            VERDICT_PREFIX="✅ **Automated recommendation: APPROVE**"
          elif [ "$VERDICT" = "request_changes" ]; then
            VERDICT_PREFIX="⚠️ **Automated recommendation: REQUEST CHANGES**"
          else
            VERDICT_PREFIX="💬 **Automated review: COMMENT**"
          fi

          {
            echo "<!-- wishlist-review-bot -->"
            echo "<!-- wishlist-review-sha:${HEAD_SHA} -->"
            echo
            echo "$VERDICT_PREFIX"
            echo
            echo "_Analysis engine: minimax-M2.7_"
            echo
          } > review-comment.md

          if [ "${{ steps.analyze.outputs.minimax_request_failed || '' }}" = "true" ]; then
            echo "_(AI review unavailable — could not reach minimax API or parse response)_" >> review-comment.md
          elif [ "${{ steps.analyze.outputs.minimax_parse_failed || '' }}" = "true" ]; then
            echo "_(AI review available but response was not valid JSON — posting raw output)_" >> review-comment.md
            echo '```' >> review-comment.md
            head -c 2000 ai-output.raw >> review-comment.md
            echo '```' >> review-comment.md
          fi

          jq -r '.review_markdown // "# Review\n\n(No review content generated)"' ai-output.json >> review-comment.md 2>/dev/null || true

          CONCERNS=$(jq -e '.concerns | length > 0' ai-output.json 2>/dev/null && jq -r '.concerns[] | "- **[\(.severity)]** \(.text)"' ai-output.json || true)
          if [ -n "$CONCERNS" ]; then
            echo >> review-comment.md
            echo "## Concerns" >> review-comment.md
            echo "$CONCERNS" >> review-comment.md
          fi

          echo >> review-comment.md
          echo "_This review is automated and advisory. The final merge decision is always yours._" >> review-comment.md

      - name: Post review comment
        if: steps.skip-check.outputs.skip_review != 'true' && steps.analyze.outputs.verdict != ''
        run: |
          set -euo pipefail

          if [ "${{ steps.analyze.outputs.minimax_request_failed || '' }}" = "true" ]; then
            echo "Skipping comment post — minimax unavailable"
            exit 0
          fi

          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --edit-last --create-if-none \
            --body-file review-comment.md

      - name: Summary
        if: always()
        run: |
          set -euo pipefail

          SKIP="${{ steps.skip-check.outputs.skip_review || 'false' }}"
          VERDICT="${{ steps.analyze.outputs.verdict || 'n/a' }}"

          if [ "$SKIP" = "true" ]; then
            echo "Review skipped: ${{ steps.skip-check.outputs.reason }}"
          else
            echo "Wishlist PR review complete — verdict: $VERDICT"
          fi
