name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.6 or v0.4.6; will normalize to 0.4.6)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Normalize version
        id: version
        run: |
          set -euo pipefail
          RAW='${{ github.event.inputs.version }}'
          VERSION="${RAW#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $RAW"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "smurf-bot[bot]"
          git config user.email "smurf-bot[bot]@users.noreply.github.com"

      - name: Bump package.json version
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Commit version bump to release branch
        id: bump
        run: |
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version file changes to commit"
          else
            BRANCH="chore/release-v${{ steps.version.outputs.version }}"
            git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"
            git push origin "HEAD:${BRANCH}"
            echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Open version-bump PR and enable auto-merge
        if: steps.bump.outputs.branch != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.bump.outputs.branch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore: release v${VERSION}" \
            --body "Automated version bump to v${VERSION} for the next release." \
            --delete-branch
          gh pr merge "${BRANCH}" --auto --squash --delete-branch

      - name: Wait for version-bump PR to merge
        if: steps.bump.outputs.branch != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          for i in $(seq 1 120); do
            STATE=$(gh pr view "${BRANCH}" --json state -q .state 2>/dev/null || echo "OPEN")
            if [ "$STATE" = "MERGED" ]; then
              echo "PR merged"
              break
            fi
            sleep 5
          done
          if [ "$STATE" != "MERGED" ]; then
            echo "ERROR: version-bump PR did not merge within 10 minutes"
            exit 1
          fi

      - name: Ensure remote main is current
        run: |
          git fetch origin main --tags
          git checkout main
          git reset --hard origin/main

      - name: Create tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
