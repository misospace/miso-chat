        function handleBrowserConnectivityChange() {
            const isOnline = typeof navigator === 'undefined' ? true : navigator.onLine;
            if (isOnline === queueLastKnownOnline) return;

            queueLastKnownOnline = isOnline;

            if (!isOnline) {
                if (queueCountForSession(currentSessionKey) > 0) {
                    clearQueueRetryTimer();
                    setOnlineState(false, waitingForInternetStatus());
                }
                addMessage('system', '📴 You are offline. Queued messages will send when your connection is back.');
                return;
            }

            const queued = queueCountForSession(currentSessionKey);
            if (queued > 0) {
                addMessage('system', `📶 Connection restored. Replaying ${queued} queued message${queued === 1 ? '' : 's'}.`);
                clearQueueRetryTimer();
                processQueue();
                return;
            }

            setOnlineState(true, queueStatusText(currentSessionKey));
            refreshBackendHealth();
        }

        function rememberLocalAssistantEcho(content) {
            const key = String(content || '').trim();
            if (!key) return;
            const now = Date.now();
            const prev = localAssistantEchoes.get(key);
            localAssistantEchoes.set(key, {
                count: (prev?.count || 0) + 1,
                expiresAt: now + 30000,
            });
        }

        function consumeLocalAssistantEcho(content) {
            const key = String(content || '').trim();
            if (!key) return false;
            const now = Date.now();
            const entry = localAssistantEchoes.get(key);
            if (!entry || entry.expiresAt < now || entry.count <= 0) {
                localAssistantEchoes.delete(key);
                return false;
            }

            if (entry.count <= 1) {
                localAssistantEchoes.delete(key);
            } else {
                localAssistantEchoes.set(key, {
                    count: entry.count - 1,
                    expiresAt: entry.expiresAt,
                });
            }
            return true;
        }

        async function fetchHistoryMessages(sessionKey) {
            try {
                const response = await apiFetch(`/api/sessions/${encodeURIComponent(sessionKey)}/history`);
                if (!response.ok) {
                    console.error('Failed to fetch history:', response.status, response.statusText);
                    return [];
                }
                const data = await response.json();
                return Array.isArray(data?.messages) ? data.messages : [];
            } catch (err) {
                console.error('Error fetching history:', err);
                return [];
            }
        }

        function stopHistoryPolling() {
            if (historyPollTimer) {
                clearInterval(historyPollTimer);
                historyPollTimer = null;
            }
            historyPollInFlight = false;
        }

        function startHistoryPolling() {
            stopHistoryPolling();
            historyPollTimer = setInterval(() => {
                pollSessionHistory();
            }, HISTORY_POLL_INTERVAL_MS);
        }

        async function pollSessionHistory() {
            if (!currentSessionKey || historyPollInFlight) return;

            const sessionKey = currentSessionKey;
            historyPollInFlight = true;

            try {
                const messages = await fetchHistoryMessages(sessionKey);
                if (sessionKey !== currentSessionKey) return;

                if (!Array.isArray(messages)) return;

                const anyOverlap = messages.some((msg, index) => historyMessageKeys.has(historyMessageKey(msg, index)));
                const likelyReset = messages.length < historyMessageKeys.size && !anyOverlap;

                if (likelyReset) {
                    renderHistory(messages);
                    renderPendingForSession(sessionKey);
                    setOnlineState(true, queueStatusText(sessionKey));
                    return;
                }

                messages.forEach((msg, index) => {
                    const key = historyMessageKey(msg, index);
                    if (historyMessageKeys.has(key)) return;

                    historyMessageKeys.add(key);

                    const role = String(msg.role || 'assistant').toLowerCase();
                    const sender = role === 'user' ? 'user' : (role === 'system' ? 'system' : 'miso');
                    if (sender === 'user') return;

                    if (sender === 'miso' && consumeLocalAssistantEcho(msg.content)) return;

                    // Prefer stable gateway ids when available; fallback to timestamp/content signature.
                    const contentSnippet = String(msg.content || '').slice(0, 40).replace(/\s+/g, '');
                    const reactionKeyHint = msg.messageId
                        ? `gateway:${msg.messageId}`
                        : `history:${msg.timestamp || index}:${msg.role || 'assistant'}:${contentSnippet}`;
                    addMessage(sender, msg.content, {
                        reactionKeyHint,
                        messageId: msg.messageId,
                        toolCalls: msg.toolCalls,
                        timestamp: msg.timestamp,
                        model: msg.model,
                    });
                });
            } catch (error) {
                console.warn('History poll error:', error);
            } finally {
                historyPollInFlight = false;
            }
        }

        
    function addImage(url) {
        const div = document.createElement('div'); div.className = 'message miso';
        const img = document.createElement('img'); img.src = url; img.loading = 'lazy';

    function addMessage(sender, content, options = {}) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;

            if (sender === 'miso') {
                const avatar = document.createElement('img');
                avatar.className = 'message-avatar';
                avatar.src = '/favicon-32x32.png';
                avatar.alt = 'Miso avatar';
                avatar.loading = 'lazy';
                avatar.decoding = 'async';
                div.appendChild(avatar);
            }

            const contentWrap = document.createElement('div');
            contentWrap.className = 'message-content';

            const text = typeof content === 'string' ? content : (content?.text ?? content?.content ?? '');
            const toolCalls = options.toolCalls || (typeof content === 'object' && content !== null ? content.toolCalls : null) || [];
            const hasToolCalls = Array.isArray(toolCalls) && toolCalls.length > 0;
            const hasText = String(text || '').trim().length > 0;

            if (sender === 'system' && hasText) {
                const reactionEvent = parseGatewayReactionEvent(text);
                if (reactionEvent && applyGatewayReactionEvent(reactionEvent)) {
                    return;
                }
            }

            if (hasText || (sender === 'miso' && hasToolCalls)) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                renderBubbleContent(bubble, hasText ? text : 'Used tools.');
                bubble.addEventListener('click', (event) => {
                    const btn = event.target.closest('.copy-code-btn');
                    if (!btn) return;
                    event.preventDefault();
                    event.stopPropagation();
                    copyCodeFromButton(btn);
                });
                contentWrap.appendChild(bubble);

                if (hasText && sender !== 'system') {
                    void appendLinkPreviews(contentWrap, text);
                }
            }

            if (hasToolCalls) {
                toolCalls.forEach((tc) => {
                    contentWrap.appendChild(renderToolCallBlock(tc));
                });
            }

            const shouldShowReactions = sender !== 'system';
            if (shouldShowReactions) {
                const key = reactionKey(sender, hasText ? text : (hasToolCalls ? 'toolCalls:' + toolCalls.length : ''), options.reactionKeyHint || options.messageId || '');
                const row = document.createElement('div');
                row.className = 'reaction-row';

                REACTION_OPTIONS.forEach((emoji) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'reaction-btn';
                    btn.setAttribute('aria-label', `React with ${emoji}`);
                    btn.setAttribute('aria-pressed', 'false');

                    // Get count for this emoji (new format: messageReactions[key] is an object)
                    const reactionsForKey = messageReactions[key] || {};
                    const count = reactionsForKey[emoji] || 0;
                    const hasReaction = count > 0;

                    // Create emoji span
                    const emojiSpan = document.createElement('span');
                    emojiSpan.textContent = emoji;
                    btn.appendChild(emojiSpan);

                    // Add count if there are reactions
                    if (hasReaction) {
                        const countSpan = document.createElement('span');
                        countSpan.className = 'reaction-count';
                        countSpan.textContent = count;
                        btn.appendChild(countSpan);
                        btn.classList.add('active');
                        btn.setAttribute('aria-pressed', 'true');
                    }

                    btn.addEventListener('click', () => {
                        // Ensure we have an object for this key
                        if (!messageReactions[key]) {
                            messageReactions[key] = {};
                        }
                        const currentCount = messageReactions[key][emoji] || 0;

                        if (currentCount > 0) {
                            // Remove reaction (decrement)
                            if (currentCount <= 1) {
                                delete messageReactions[key][emoji];
                            } else {
                                messageReactions[key][emoji] = currentCount - 1;
                            }
                        } else {
                            // Add reaction (increment)
                            messageReactions[key][emoji] = currentCount + 1;
                        }

                        // Clean up empty objects
                        if (Object.keys(messageReactions[key]).length === 0) {
                            delete messageReactions[key];
                        }

                        saveReactions(messageReactions);
                        syncReactionRows(key);
                    });

                    row.appendChild(btn);
                });

                contentWrap.appendChild(row);

                // Register this row for live updates when gateway reaction events arrive
                if (!reactionRowsByKey.has(key)) reactionRowsByKey.set(key, new Set());
                reactionRowsByKey.get(key).add(row);
            }

            // Add model indicator for assistant messages
            if (sender === 'miso' && options.model) {
                const modelEl = document.createElement('div');
                modelEl.className = 'message-model';
                // Format: "via {model}" (e.g., "via MiniMax-M2.5", "via qwen122b")
                const modelName = String(options.model).replace(/^model:/, '');
                modelEl.textContent = `via ${modelName}`;
                contentWrap.appendChild(modelEl);
            }

            // Add timestamp if provided
            if (options.timestamp) {
                const timeEl = document.createElement('div');
                timeEl.className = 'message-time';
                const date = new Date(options.timestamp);
                timeEl.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                contentWrap.appendChild(timeEl);
            }

            div.appendChild(contentWrap);
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            if (sender === 'miso' && !options.suppressNotify) {
                notifyAssistantReply(content);
            }
        }

        function renderHistory(messages) {
            messagesDiv.innerHTML = '';
            historyMessageKeys = new Set();

            if (!Array.isArray(messages) || messages.length === 0) {
                addMessage('system', '📝 New session');
                return;
            }

            reactionRowsByKey.clear();
            messages.forEach((msg, index) => {
                historyMessageKeys.add(historyMessageKey(msg, index));
                const role = String(msg.role || 'assistant').toLowerCase();
                const sender = role === 'user' ? 'user' : (role === 'system' ? 'system' : 'miso');
                // Include content snippet to ensure unique reaction keys even with duplicate timestamps
                const contentSnippet = String(msg.content || '').slice(0, 40).replace(/\s+/g, '');
                const reactionKeyHint = msg.messageId
                    ? `gateway:${msg.messageId}`
                    : `history:${msg.timestamp || index}:${msg.role || 'assistant'}:${contentSnippet}`;
                addMessage(sender, msg.content, {
                    reactionKeyHint,
                    messageId: msg.messageId,
                    suppressNotify: true,
                    toolCalls: msg.toolCalls,
                    timestamp: msg.timestamp,
                    model: msg.model,
                });
            });
        }

        function renderPendingForSession(sessionKey) {
            const pending = sendQueue.filter((item) => !item.sessionKey || item.sessionKey === sessionKey);
            pending.forEach((item) => {
                addMessage('user', `${item.message} ⏳`, {
                    reactionKeyHint: `queued:${item.id}`,
                    timestamp: item.createdAt || Date.now(),
                });
            });
            if (pending.length > 0) {
                addMessage('system', `${pending.length} queued message${pending.length > 1 ? 's' : ''} will retry.`);
            }
        }

        async function loadConfig() {
            try {
                const response = await apiFetch('/api/config');
                const cfg = await response.json();
                if (cfg?.assistantName) {
                    configuredAssistantName = cfg.assistantName;
                    localStorage.setItem(ASSISTANT_NAME_STORAGE_KEY, configuredAssistantName);
                }

        // SSE connection for real-time gateway events
        let eventSource = null;
        function connectEventSource() {
            if (eventSource) {
                eventSource.close();
            }
            eventSource = new EventSource(apiUrl('/api/events'));

            eventSource.onopen = () => {
                sseConnected = true;
                if (currentSessionKey) {
                    setOnlineState(true, queueStatusText(currentSessionKey));
                }
                updateTypingIndicator();
                console.log('📡 SSE connected');
            };

            eventSource.onmessage = (e) => {
                try {
                    const payload = JSON.parse(e.data || '{}');
                    const eventType = payload?.event;
                    const eventData = payload?.data;
                    if (!eventType) return;

                    if (eventType === 'typing.start') {
                        sseTypingActive = true;
                        updateTypingIndicator();
                    }
                    if (eventType === 'typing.stop') {
                        sseTypingActive = false;
                        updateTypingIndicator();
                    }
                    if (eventType === 'error' && eventData?.message) {
                        addMessage('system', `Gateway error: ${eventData.message}`);
                    }
                } catch (err) {
                    // noop
                }
            };

            eventSource.onerror = async () => {
                sseConnected = false;
                sseTypingActive = false;
                updateTypingIndicator();
                console.warn('📡 SSE connection error, reconnecting...');
                startHistoryPolling();
                await refreshBackendHealth();
                eventSource = null;
                setTimeout(connectEventSource, 5000);
            };
        }

        async function loadSessions() {
            try {
                const queryBackend = new URLSearchParams(window.location.search).get('backend');
                if (queryBackend && !normalizeBaseUrl(queryBackend)) {
                    const invalidBackendError = new Error('Invalid backend URL');
                    invalidBackendError.code = 'INVALID_BACKEND_URL';
                    throw invalidBackendError;
                }

                const response = await apiFetch('/api/sessions');
                if (!response.ok) {
                    const apiError = await extractApiErrorMessage(response);
                    const err = new Error(apiError || `Request failed (${response.status})`);
                    err.httpStatus = response.status;
                    err.apiError = apiError;
                    throw err;
                }

                const data = await response.json();
                if (data?.error) {
                    const err = new Error(data.error);
                    err.apiError = data.error;
                    throw err;
                }

                const sessions = Array.isArray(data.sessions) ? data.sessions : [];

                if (data.defaultSessionKey) defaultSessionKey = data.defaultSessionKey;

                sessionSelect.innerHTML = '';
                sessionSelect.disabled = false;

                sessionMetaByKey.clear();
                sessions.forEach((session) => {
                    if (session?.sessionKey) sessionMetaByKey.set(session.sessionKey, session);
                    const option = document.createElement('option');
                    option.value = session.sessionKey;
                    option.textContent = buildSessionLabel(session);
                    sessionSelect.appendChild(option);
                });

                if (sessions.length === 0) {
                    stopHistoryPolling();
                    sseTypingActive = false;
                    updateTypingIndicator();
                    setOnlineState(false, 'No sessions');
                    return;
                }

                const { selected, notice, clearStored } = resolvePreferredSession(sessions);
                if (!selected?.sessionKey) {
                    sseTypingActive = false;
                    updateTypingIndicator();
                    setOnlineState(false, 'No sessions');
                    return;
                }

                if (clearStored) {
                    await persistStoredSessionKey(null);
                }

                await selectSession(selected.sessionKey, { notice });
            } catch (error) {
                console.error('Error loading sessions:', error);
                stopHistoryPolling();
                sseTypingActive = false;
                updateTypingIndicator();
                sessionSelect.innerHTML = '<option value="">Error</option>';
                const diagnostic = buildSessionLoadDiagnostic(error);
                setOnlineState(false, diagnostic);
                addMessage('system', diagnostic);
            }
        }

        async function selectSession(sessionKey, options = {}) {
            if (!sessionKey) return;

            currentSessionKey = sessionKey;
            sseTypingActive = false;
            await persistStoredSessionKey(sessionKey);
            sessionSelect.value = sessionKey;
            const selectedMeta = sessionMetaByKey.get(sessionKey);
            const sessionAssistant = selectedMeta?.agentName || selectedMeta?.displayName || configuredAssistantName || 'Assistant';
            assistantNameEl.textContent = sessionAssistant;
            messageInput.placeholder = `Message ${sessionAssistant}...`;
            clearQueueRetryTimer(true);
            setOnlineState(true, 'Loading history...');
            updateTypingIndicator();

            try {
                const messages = await fetchHistoryMessages(sessionKey);
                renderHistory(messages);
                renderPendingForSession(sessionKey);
                if (options.notice) addMessage('system', options.notice);
                setOnlineState(true, queueStatusText(sessionKey));
                startHistoryPolling();
                processQueue();
            } catch (error) {
                console.error('History load error:', error);
                renderHistory([]);
                renderPendingForSession(sessionKey);
                if (options.notice) addMessage('system', options.notice);
                setOnlineState(true, queueStatusText(sessionKey));
                startHistoryPolling();
                processQueue();
            }
        }

        async function processQueue() {
            if (sending || sendQueue.length === 0) return;
            if (!currentSessionKey) return;

            const activeSessionKey = currentSessionKey;
            const nextIndex = sendQueue.findIndex((item) => !item.sessionKey || item.sessionKey === activeSessionKey);
            if (nextIndex < 0) return;

            if (typeof navigator !== 'undefined' && navigator.onLine === false) {
                scheduleQueueRetry(QUEUE_RETRY_BASE_DELAY_MS);
                return;
            }

            clearQueueRetryTimer();
            sending = true;
            let sendFailed = false;
            const [next] = sendQueue.splice(nextIndex, 1);
            savePendingQueue(sendQueue);
            updateTypingIndicator();

            setOnlineState(true, queueStatusText(activeSessionKey));

            try {
                // Try streaming endpoint first (with fallback to regular send)
                const streamResponse = await apiFetch(`/api/sessions/${encodeURIComponent(activeSessionKey)}/send-stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: next.message }),
                });

                if (streamResponse.ok) {
                    // Use streaming response
                    const text = await processStreamingResponse(streamResponse, next.id);
                    if (text && text.trim()) {
                        rememberLocalAssistantEcho(text);
                        addMessage('miso', text || '', { reactionKeyHint: `reply:${next.id}` });
                    }
                } else {
                    // Fallback to regular send endpoint
                    const response = await apiFetch(`/api/sessions/${encodeURIComponent(activeSessionKey)}/send`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: next.message }),
                    });
                    const data = await response.json();

                    if (!response.ok || !data?.success) {
                        sendFailed = true;
                        const errorText = data?.error || response.statusText || 'Send failed';
                        addMessage('system', errorText);
                        sendQueue.unshift(next);
                        savePendingQueue(sendQueue);
                        return;
                    }

                    const hasSanitizedResponse = Object.prototype.hasOwnProperty.call(data || {}, 'responseText');
                    const text = hasSanitizedResponse
                        ? data.responseText
                        : (data.response?.text || data.response?.message);
                    const toolCalls = Array.isArray(data.toolCalls) ? data.toolCalls : [];
                    const model = data.response?.model || data.model || null;
                    if ((text && text.trim()) || toolCalls.length > 0) {
                        if (text && text.trim()) rememberLocalAssistantEcho(text);
                        addMessage('miso', text || '', { reactionKeyHint: `reply:${next.id}`, toolCalls, model });
                    // Handle images in response
                    if (data.images && Array.isArray(data.images)) {
                        data.images.forEach(img => addImage(img));
                    }
                }

                // Remove typing indicator after getting response
                await pollSessionHistory();
            } catch (error) {
                sendFailed = true;
                console.error('Send error:', error);
                addMessage('system', `Send failed: ${error.message}`);
                sendQueue.unshift(next);
                savePendingQueue(sendQueue);
            }
            } catch (error) {
                sendFailed = true;
                console.error('Send error:', error);
                addMessage('system', `Send failed: ${error.message}`);
                sendQueue.unshift(next);
                savePendingQueue(sendQueue);
            } finally {
                sending = false;
                const remaining = queueCountForSession(activeSessionKey);
                updateTypingIndicator();

                if (sendFailed) {
                    if (typeof navigator !== 'undefined' && navigator.onLine === false) {
                        setOnlineState(false, waitingForInternetStatus(activeSessionKey));
                    } else {
                        scheduleQueueRetry();
                    }
                    refreshBackendHealth();
                    return;
                }

                resetQueueRetryBackoff();
                setOnlineState(true, queueStatusText(activeSessionKey));
                if (remaining > 0) processQueue();
            }
        }

        // Process streaming response from /send-stream endpoint
        async function processStreamingResponse(response, messageId) {
            let fullText = '';
            const eventSource = new EventSource(response.url);
            
            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'connected') {
                        console.log('Streaming connection established');
                    } else if (data.type === 'complete') {
                        fullText = data.responseText || '';
                        if (data.toolCalls && Array.isArray(data.toolCalls)) {
                            addMessage('miso', fullText || '', { 
                                reactionKeyHint: `reply:${messageId}`, 
                                toolCalls: data.toolCalls,
                                model: data.model || null
                            });
                        } else if (fullText && fullText.trim()) {
                            addMessage('miso', fullText || '', { 
                                reactionKeyHint: `reply:${messageId}`, 
                                model: data.model || null
                            });
                        }
                    } else if (data.type === 'error') {
                        console.error('Stream error:', data.error);
                        addMessage('system', `Stream error: ${data.error}`);
                    } else if (data.type === 'done') {
                        eventSource.close();
                    }
                } catch (e) {
                    console.error('Error parsing stream event:', e);
                }
            };
            
            eventSource.onerror = (error) => {
                console.error('EventSource error:', error);
                eventSource.close();
            };
            
            // Wait for stream to complete (with timeout)
            await new Promise((resolve, reject) => {
                const timeout = setTimeout(() => {
                    eventSource.close();
                    resolve(fullText);
                }, 180000); // 3 minute timeout
                
                eventSource.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'done') {
                            clearTimeout(timeout);
                            eventSource.close();
                            resolve(fullText);
                        }
                    } catch (e) {
                        // Ignore parse errors
                    }
                };
            });
            
            return fullText;
        }

        async function sendSlashCommandToOpenClaw(rawSlashCommand) {
            if (!currentSessionKey) {
                addMessage('system', 'Select a session first.');
                return;
            }

            try {
                const response = await apiFetch(`/api/sessions/${encodeURIComponent(currentSessionKey)}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: rawSlashCommand }),
                });
                const data = await response.json();

                if (!response.ok) {
                    addMessage('system', `OpenClaw command failed: ${data?.error || response.statusText || 'unknown error'}`);
                    return;
                }

                const reply =
                    (typeof data?.response?.text === 'string' && data.response.text.trim())
                    || (typeof data?.response?.message === 'string' && data.response.message.trim())
                    || (typeof data?.response === 'string' && data.response.trim())
                    || '';
                const model = data.response?.model || data.model || null;

                if (reply) addMessage('miso', reply, { model });
                else addMessage('system', `Command sent: ${rawSlashCommand}`);
            } catch (error) {
                addMessage('system', `OpenClaw command failed: ${error?.message || 'network error'}`);
            }
        }

        // Slash command handler (OpenClaw-first, bypasses local queue)
        function handleSlashCommand(cmd) {
            const input = cmd.slice(1).trim();
            const [rawCommand = ''] = input.split(/\s+/);
            const command = rawCommand.toLowerCase();

            if (command === 'help') {
                addMessage('system', 'Slash commands are sent directly to OpenClaw (queue bypass).\nSpecial handling: /status (native session status card).');
                return;
            }

            if (command === 'status') {
                (async () => {
                    try {
                        const query = currentSessionKey ? `?sessionKey=${encodeURIComponent(currentSessionKey)}` : '';
                        const response = await apiFetch(`/api/openclaw-status${query}`);
                        const data = await response.json();

                        if (!response.ok || data?.ok === false) {
                            addMessage('system', `OpenClaw status failed: ${data?.error || 'unknown error'}`);
                            return;
                        }

                        const text =
                            (typeof data?.text === 'string' && data.text.trim())
                            || (typeof data?.payload?.statusText === 'string' && data.payload.statusText.trim())
                            || (typeof data?.payload?.text === 'string' && data.payload.text.trim())
                            || (typeof data?.payload?.summary === 'string' && data.payload.summary.trim())
                            || 'OpenClaw status unavailable.';
                        const model = data.model || data.response?.model || null;

                        addMessage('miso', text, { model });
                    } catch (error) {
                        addMessage('system', `OpenClaw status failed: ${error?.message || 'network error'}`);
                    }
                })();
                return;
            }

            sendSlashCommandToOpenClaw(cmd);
        }

        function clearChatDisplay() {
            const messagesContainer = document.getElementById('messages');
            if (messagesContainer) {
                messagesContainer.innerHTML = '';
            }
        }

        function sendMessage(text = null) {
            const raw = text ?? messageInput.value ?? '';
            const messageText = String(raw).trim();
            if (!messageText) return;

            // Close emoji picker when sending a message
            emojiPicker.classList.remove('open');
            closeShortcodeSuggestions();

            // Handle slash commands immediately (bypass queue)
            if (messageText.startsWith('/')) {
                handleSlashCommand(messageText);
                messageInput.value = '';
                resizeMessageInput();
                return;
            }

            const outgoingMessage = replaceExactShortcodes(messageText);
            
            if (!currentSessionKey) {
                addMessage('system', 'Select a session first.');
                return;
            }

            const queuedId = queueId();
            const createdAt = Date.now();
            addMessage('user', outgoingMessage, {
                reactionKeyHint: `queued:${queuedId}`,
                timestamp: createdAt,
            });
            messageInput.value = '';
            resizeMessageInput();
            messageInput.focus();
            sendQueue.push({
                id: queuedId,
                sessionKey: currentSessionKey,
                message: outgoingMessage,
                createdAt,
            });
            savePendingQueue(sendQueue);
            updateTypingIndicator();
            processQueue();
        }

        async function refreshCurrentSession() {
            if (currentSessionKey) {
                await selectSession(currentSessionKey);
            } else {
                await loadSessions();
            }
        }

        async function logout() {
            // Stop all polling first
            stopHistoryPolling();

            // Clear auth/session client state first (secure storage + local fallback)
            await clearAuthLocalState();

            // Clear all localStorage to prevent any session restoration
            try {
                localStorage.clear();
            } catch (e) {
                console.warn('localStorage clear failed:', e);
            }

            // Destroy session on server
            try {
                await fetch(apiUrl('/logout'), { method: 'POST', credentials: 'include' });
            } catch (e) {
                console.warn('Logout fetch failed:', e);
            }

            // Force hard redirect to auth page tied to selected backend
            window.location.replace(loginUrl());
        }

        }

        // Emoji picker

        emojiPicker.className = 'emoji-picker';

        for (const emoji of emojis) {
            const btn = document.createElement('button');
            btn.textContent = emoji;
            btn.onclick = () => insertEmoji(emoji);
            emojiPicker.appendChild(btn);
        }
        
        document.querySelector('.input-wrapper').appendChild(emojiPicker);
        
        function insertEmoji(emoji) {
            const start = messageInput.selectionStart;
            const end = messageInput.selectionEnd;
            const text = messageInput.value;
            messageInput.value = text.slice(0, start) + emoji + text.slice(end);
            messageInput.selectionStart = messageInput.selectionEnd = start + emoji.length;
            messageInput.focus();
            emojiPicker.classList.remove('open');
        }
        
        const emojiBtn = document.getElementById('emojiBtn');
        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPicker.classList.toggle('open');
        });
        
        document.addEventListener('click', (event) => {
            emojiPicker.classList.remove('open');
            closeActionMenu();

            const clickedInsideSuggestions = shortcodeSuggestions.contains(event.target);
            const clickedInput = event.target === messageInput;
            if (!clickedInsideSuggestions && !clickedInput) {
                closeShortcodeSuggestions();
            }
        });

        messageInput.addEventListener('input', () => {
            resizeMessageInput();
            updateShortcodeSuggestions();
        });
        messageInput.addEventListener('click', updateShortcodeSuggestions);
        messageInput.addEventListener('keyup', updateShortcodeSuggestions);

        messageInput.addEventListener('keydown', (e) => {
            if (shortcodeSuggestions.classList.contains('open')) {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    activeShortcodeIndex = (activeShortcodeIndex + 1) % activeShortcodeResults.length;
                    renderShortcodeSuggestions();
                    return;
                }

                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    activeShortcodeIndex = (activeShortcodeIndex - 1 + activeShortcodeResults.length) % activeShortcodeResults.length;
                    renderShortcodeSuggestions();
                    return;
                }

                if (e.key === 'Enter' || e.key === 'Tab') {
                    e.preventDefault();
                    applyShortcodeSelection(activeShortcodeIndex >= 0 ? activeShortcodeIndex : 0);
                    return;
                }

                if (e.key === 'Escape') {
                    e.preventDefault();
                    closeShortcodeSuggestions();
                    return;
                }
            }

            if (e.key !== 'Enter') return;
            if (isLikelyMobile()) {
                // Mobile: Enter inserts newline, Send button sends
                return;
            }
            // Desktop: Enter sends, Shift+Enter inserts newline
            if (!e.shiftKey) {
                e.preventDefault();
                maybePromptForNotificationPermission();
                sendMessage();
            }
        });

        window.addEventListener('resize', () => {
            if (shortcodeSuggestions.classList.contains('open') && activeShortcode) {
                positionShortcodeSuggestions(activeShortcode.end);
            }
        });

        refreshBtn?.addEventListener('click', refreshCurrentSession);
        sendBtn.addEventListener('click', () => {
            maybePromptForNotificationPermission();
            sendMessage();
        });

        menuBtn?.addEventListener('click', (e) => {
            e.stopPropagation();
            actionMenu?.classList.toggle('open');
        });
        actionMenu?.addEventListener('click', (e) => e.stopPropagation());

        menuSoundBtn?.addEventListener('click', () => {
            closeActionMenu();
            soundEnabled = !soundEnabled;
            localStorage.setItem(NOTIFY_SOUND_KEY, soundEnabled ? '1' : '0');
            if (soundEnabled) maybePromptForNotificationPermission();
            updateSoundToggle();
            updateDesktopNotificationToggle();
        });
menuDesktopNotifyBtn?.addEventListener('click', async () => {            closeActionMenu();            if (!browserNotificationsSupported()) return;            if (Notification.permission === 'default') {                const result = await requestDesktopNotificationPermission(true);                if (result !== 'granted') {                    desktopNotificationsEnabled = false;                    localStorage.setItem(NOTIFY_DESKTOP_KEY, '0');                } else {                    desktopNotificationsEnabled = true;                    localStorage.setItem(NOTIFY_DESKTOP_KEY, '1');                }            } else {                desktopNotificationsEnabled = !desktopNotificationsEnabled;                localStorage.setItem(NOTIFY_DESKTOP_KEY, desktopNotificationsEnabled ? '1' : '0');            }            if (!desktopNotificationsEnabled) {                closeActiveDesktopNotifications();            }            updateDesktopNotificationToggle();        });
        menuThemeBtn?.addEventListener('click', () => {
            closeActionMenu();
            toggleTheme();
        });
        menuBackendBtn?.addEventListener('click', async () => {
            closeActionMenu();
            await openBackendSettings();
        });
        menuLogoutBtn?.addEventListener('click', () => {
            closeActionMenu();
            logout();
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) clearUnreadNotifications();
        });
        window.addEventListener('focus', clearUnreadNotifications);
        window.addEventListener('online', handleBrowserConnectivityChange);
        window.addEventListener('offline', handleBrowserConnectivityChange);

        (async () => {
            initTheme();
            await registerNotificationServiceWorker();
            updateSoundToggle();
            updateDesktopNotificationToggle();
            assistantNameEl.textContent = configuredAssistantName;
            messageInput.placeholder = `Message ${configuredAssistantName}...`; 
            resizeMessageInput();
            setOnlineState(false, 'Connecting...');
            await ensureMobileBackendConfigured();

            // Handle deep links on mobile (when app is opened via misochat:// URL)
            if (isNativeCapacitor()) {
                const appPlugin = window.Capacitor?.Plugins?.App;
                if (appPlugin && typeof appPlugin.addListener === 'function') {
                    appPlugin.addListener('appUrlOpen', async (data) => {
                        try {
                            await handleMobileAuthCallback(data.url, { reloadOnSuccess: true });
                        } catch (error) {
                            console.error('[DeepLink] callback handling failed', error);
                            await recoverFromMobileAuthCallbackFailure('unexpected appUrlOpen handler error', error);
                        }
                    });
                } else {
                    console.warn('[DeepLink] App plugin unavailable');
                }
            }

            await consumeMobileAuthTokenFromUrl();
            await hydrateStoredSessionKey();
            await loadConfig();
            await loadSessions();
            connectEventSource();
            await refreshBackendHealth();
            setInterval(refreshBackendHealth, 15000);
        })();
    </script>
